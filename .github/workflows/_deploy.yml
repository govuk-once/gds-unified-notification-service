name: Release to env

permissions:
  contents: read
  id-token: write

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: 'Github environment to use'
        type: string
        required: true
      VERSION:
        description: 'Version label'
        type: string
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.ENVIRONMENT }}
    timeout-minutes: 60
    steps:
      # Setup
      - name: ⚙️ Checkout Code
        uses: actions/checkout@v6

      - name: Show OIDC claims (right before assume)
        if: ${{ runner.debug }}
        env:
          AUDIENCE: 'sts.amazonaws.com'
        run: |
          TOKEN_JSON=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE")
          ID_TOKEN=$(echo "$TOKEN_JSON" | jq -r .value)
          echo "$ID_TOKEN" | awk -F. '{print $2}' | base64 -d 2>/dev/null | jq -r '.sub'

      - name: ⚙️ Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6
        with:
          node-version-file: '.node-version'

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@a1502cd9e758c50496cc9ac5308c4843bcd56d36 # v3

      - name: ⚙️ Install Dependencies
        run: npm ci

      # Build & release
      - name: 🔨 Build bundles
        run: npm run build

      - name: 🏗️ Terraform Deploy
        working-directory: ./terraform/notifications
        run: |
          terraform init \
            -backend-config "region=$TF_VAR_region" \
            -backend-config "bucket=$TF_VAR_bucket" \
            -backend-config "key=$TF_VAR_key"
          terraform apply -auto-approve
        env:
          TF_VAR_region: ${{ vars.AWS_REGION }}
          TF_VAR_bucket: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_env: '${{ vars.ENVIRONMENT_SHORTHAND }}'
          TF_VAR_key: state.json
          TF_VAR_code_version: ${{ inputs.VERSION }}
          TF_VAR_use_mtls: 'true'
          TF_VAR_is_main_environment_in_account: 'true'

      # End to end testing
      # - name: 🧪 E2E Testing
      #   run: npm run test:e2e
