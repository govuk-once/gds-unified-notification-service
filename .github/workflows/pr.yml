name: PR pipeline

on:
  # Trigger the workflow on pull request
  pull_request

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  pr:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # Setup
      - name: ⚙️ Checkout Code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: ⚙️ Configure AWS credentials (For package registry pulling)
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ secrets.AWS_CODEARTIFACT_ROLE_ARN }}
          aws-region: eu-west-2

      - name: ⚙️ Configure Codeartifact
        run: aws codeartifact login --tool npm --repository registry-prod-repo --domain registry-prod --domain-owner ${{ secrets.AWS_CODEARTIFACT_ACCOUNT_ID }} --region eu-west-2

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6
        with:
          node-version-file: '.node-version'

      - name: ⚙️ Install Dependencies
        run: npm ci

      - name: ⚙️ Validate Typescript
        run: npm run build:validate

      - name: 🔨 Build bundles
        run: npm run build

      # Formatting
      - name: 📝 Run Lint
        run: npm run lint

      - name: 📝 Terraform naming convention lint
        run: npm run development:organize:tf -- --dry-run

      - name: Terraform init (no backend)
        working-directory: ./infrastructure/terraform
        run: terraform init -backend=false

      - name: 📝 Terraform Formatting
        working-directory: ./infrastructure/terraform
        run: terraform fmt -check -diff -recursive

      - name: 📝 Terraform validate
        working-directory: ./infrastructure/terraform
        run: terraform validate

      # Testing
      - name: 🧪 Run Unit tests
        id: unittests
        run: |
          echo "Test results:" > coverage.md
          echo '```' >> coverage.md
          (npm run test:coverage 2>&1 | grep -A1000 "= Coverage summary =" | tee -a coverage.md) || echo "Failed to meet the criteria"
          echo '```' >> coverage.md
          content="${content//'%'/'%25'}"
          content="${content//$'\n'/'%0A'}"
          content="${content//$'\r'/'%0D'}"

          echo 'report<<EOF' >> $GITHUB_OUTPUT
          cat coverage.md >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: 🧪 Create Comment with Test results
        uses: hasura/comment-progress@146c635f3e325d478025e29e5043ec1c07c0e36c # v2.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: 'govuk-once/gds-unified-notification-service'
          number: ${{ github.event.number }}
          id: unittestscomment
          message: '${{steps.unittests.outputs.report}}'
          recreate: true

      # CDK Validation - Explicitly ovewriting AWS env vars so CDK:SYNTH ignores assumed role
      - name: 🏗️ CDK Synth
        if: success() || failure() # Until TF Migration is completed
        run: |
          AWS_REGION=eu-west-2 AWS_DEFAULT_REGION=eu-west-2 AWS_ACCESS_KEY_ID="" AWS_SECRET_ACCESS_KEY="" AWS_SESSION_TOKEN="" npm run cdk:synth

      - name: 🔐 Checkov GitHub Action (CheckovCDK)
        if: success() || failure()
        uses: bridgecrewio/checkov-action@8f61ce5b8a3afb4ca94d236b75201878ded6d2cd # v12
        with:
          output_format: cli
          soft_fail: true
          framework: cloudformation
          directory: infrastructure/cdk/cdk.out/
          config_file: .checkov.yaml
          quiet: true

      # Security scans - Always executed even if the formatting or tests fail
      - name: 🔐 TF Sec
        if: success() || failure()
        uses: aquasecurity/tfsec-action@a73ebc46fba54691e25cbe901656e7b205fb9bf2 # v1.0.0

      - name: 🔐 Checkov GitHub Action
        if: success() || failure()
        uses: bridgecrewio/checkov-action@8f61ce5b8a3afb4ca94d236b75201878ded6d2cd # v12
        with:
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: true
          quiet: true

      - name: ⚙️ Upload SARIF file
        uses: github/codeql-action/upload-sarif@cdefb33c0f6224e58673d9004f47f7cb3e328b89 # v4
        if: success() || failure()
        with:
          sarif_file: results.sarif

      # SonarQube - Scan, Gate, Report
      - name: 🕵🏻 Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_UNS }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}

      - name: 🕵🏻 SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_UNS }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}

      - name: 🕵🏻 Create Comment with SonarQube's Quality Gate
        uses: hasura/comment-progress@146c635f3e325d478025e29e5043ec1c07c0e36c # v2.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: 'govuk-once/gds-unified-notification-service'
          number: ${{ github.event.number }}
          id: qualitygatecomment
          message: 'SonarQube Quality Gate Status: ${{steps.sonarqube-quality-gate-check.outputs.quality-gate-status}}'
          recreate: true
