name: Deploy environment (Manual)
on:
  workflow_dispatch:
    inputs:
      deploy_to_dev:
        description: 'Deploy to Dev'
        type: boolean
        required: true
      deploy_to_stg:
        description: 'Deploy to Staging'
        type: boolean
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  releaseDev:
    if: ${{ inputs.deploy_to_dev }}
    runs-on: ubuntu-latest
    environment: Dev
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Show OIDC claims (right before assume)
        if: ${{ runner.debug }}
        env:
          AUDIENCE: 'sts.amazonaws.com'
        run: |
          TOKEN_JSON=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE")
          ID_TOKEN=$(echo "$TOKEN_JSON" | jq -r .value)
          echo "$ID_TOKEN" | awk -F. '{print $2}' | base64 -d 2>/dev/null | jq -r '.sub'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Install Dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform deploy
        working-directory: ./terraform/notifications
        run: |
          terraform init \
            -backend-config "region=$TF_VAR_region" \
            -backend-config "bucket=$TF_VAR_bucket" \
            -backend-config "key=$TF_VAR_key"
          terraform apply -auto-approve
        env:
          TF_VAR_region: ${{ secrets.AWS_REGION }}
          TF_VAR_bucket: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_env: ${{ secrets.ENVIRONMENT_SHORTHAND }}
          TF_VAR_key: state.json
          TF_VAR_code_version: ${{ github.ref_name}}
          TF_VAR_use_mtls: 'true'
          TF_VAR_is_main_environment_in_account: 'true'
  # releaseDev:
  #   if: ${{ inputs.deploy_to_dev }}
  #   name: Deploy to dev
  #   uses: ./.github/workflows/_deploy.yml
  #   with:
  #     ENVIRONMENT: Dev
  #     VERSION: ${{ github.ref_name}}
  #   secrets: inherit

  releaseStaging:
    if: ${{ inputs.deploy_to_stg }}
    name: Deploy to staging
    uses: ./.github/workflows/_deploy.yml
    with:
      ENVIRONMENT: Staging
      VERSION: ${{ github.ref_name}}
    secrets: inherit
