name: Deploy environment (Manual)
on:
  workflow_dispatch:
    inputs:
      deploy_to_dev:
        description: 'Deploy to Dev'
        type: boolean
        required: true
      deploy_to_stg:
        description: 'Deploy to Staging'
        type: boolean
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  releaseDev:
    if: ${{ inputs.deploy_to_dev }}
    name: Deploy to dev
    uses: ./.github/workflows/_deploy.yml
    with:
      ENVIRONMENT: Dev
      VERSION: ${{ github.ref_name}}

  releaseStaging:
    if: ${{ inputs.deploy_to_stg }}
    name: Deploy to staging
    uses: ./.github/workflows/_deploy.yml
    with:
      ENVIRONMENT: Staging
      VERSION: ${{ github.ref_name}}
