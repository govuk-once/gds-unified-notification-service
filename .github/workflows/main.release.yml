name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      semVer: ${{ steps.release.outputs.semVer }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: ⚙️ Configure AWS credentials (For package registry pulling)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ secrets.AWS_CODEARTIFACT_ROLE_ARN }}
          aws-region: eu-west-2

      - name: ⚙️ Configure Codeartifact
        run: aws codeartifact login --tool npm --repository registry-prod-repo --domain registry-prod --domain-owner ${{ secrets.AWS_CODEARTIFACT_ACCOUNT_ID }} --region eu-west-2

      - name: ⚙️ Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'

      - name: Install Dependencies
        run: pnpm ci

      - name: Run Semantic Release
        id: release
        run: pnpm run semantic:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Version
        run: echo "The next version is ${{ steps.release.outputs.semVer }}"

  releaseToDev:
    needs: release
    name: Deploy to dev
    uses: ./.github/workflows/_deploy.yml
    with:
      ENVIRONMENT: dev
      VERSION: ${{needs.release.outputs.semVer}}@${{ github.sha }}
    secrets: inherit

  releaseStaging:
    needs: [release, releaseToDev]
    name: Deploy to staging
    uses: ./.github/workflows/_deploy.yml
    with:
      ENVIRONMENT: staging
      VERSION: ${{needs.release.outputs.semVer}}@${{ github.sha }}
    secrets: inherit
