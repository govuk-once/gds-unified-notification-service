openapi: 3.0.4
info:
  title: Unified Notification Service v0.1 - Flex integration
  version: 'v0.1'
  description: Work in progress
servers:
  - url: /api

security:
  - bearerAuth: []

paths:
  /notifications:
    get:
      summary: Gets users notifications
      operationId: getNotifications
      tags:
        - MVP
      parameters:
        - name: pushID
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                minItems: 1
                maxItems: 50
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

  /notifications/{notificationID}:
    get:
      summary: Gets notification by ID
      operationId: getNotificationByID
      tags:
        - MVP
      parameters:
        - name: notificationID
          in: path
          required: true
          schema:
            type: string
        - name: pushID
          in: query
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Notification found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '400':
          description: Bad Request Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

    delete:
      summary: Deletes notification by ID
      operationId: deleteNotificationByID
      tags:
        - MVP
      parameters:
        - name: notificationID
          in: path
          required: true
          schema:
            type: string
        - name: pushID
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Notification deleted (No content)
        '400':
          description: Bad Request Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

  /notifications/{notificationID}/status:
    patch:
      summary: Update status of notification
      operationId: patchNotificationByID
      tags:
        - MVP
      parameters:
        - name: notificationID
          in: path
          required: true
          schema:
            type: string
        - name: pushID
          in: query
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                Status:
                  $ref: '#/components/schemas/Status'
        required: true
      responses:
        '202':
          description: Update accepted
        '400':
          description: Bad Request Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: AWS_IAM_SIGV4

  schemas:
    Notification:
      type: object
      required:
        - NotificationID
        - Status
        - NotificationBody
        - NotificationTitle
        - DispatchedDateTime
        - Metadata
      properties:
        NotificationID:
          type: string
          description: ID of the notification to be used for idempotency & analytics
        Status:
          $ref: '#/components/schemas/Status'
        NotificationTitle:
          type: string
          description: Title of the notification to be displayed on mobile device
        NotificationBody:
          type: string
          description: Contents of the notification to be displayed on push notification
        DispatchedDateTime:
          type: string
          format: date-time
        MessageTitle:
          type: string
          description: (Optional) Title of the message displayed in the GovUK app's notification centre, falls back on notification title
        MessageBody:
          type: string
          description: (Optional) Contents of the message displayed in the GovUK app's notification centre, falls back on notification body
        Metadata:
          type: object
          required:
            - Sender
          properties:
            Sender:
              type: object
              required:
                - DisplayName
              properties:
                DisplayName:
                  type: string
                  description: Human readable identifier for the organisation that send the notification

    Status:
      type: string
      enum:
        - RECEIVED
        - READ
        - MARKED_AS_UNREAD

    BaseError:
      type: object
      properties:
        Status:
          type: integer
        HttpError:
          type: string
        Errors:
          type: array
          minItems: 0
          maxItems: 100
          items:
            type: string

    BadRequestError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
    UnauthorizedError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
    NotFoundError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
    ExpectationFailedError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
    InternalServerError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
